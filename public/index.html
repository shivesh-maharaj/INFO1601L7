<!DOCTYPE html>
<html lang="en">
<head>
    <!--

    -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
       *{
        box-sizing: border-box;
        }

        body{
            display: flex;

            padding: 0px;
            margin: 0px;
            flex-direction: column;
            gap: 10px;
            background-color: gainsboro;

        }

        nav{
            padding: 10px;
            color: white;
            font-size: 25px;
            font-family: monospace;
            font-weight: bold;
            background-color: blue;
            display: flex;
            box-shadow: 0px, 10px, 5px, 0px rgba(0,0,0,0.31);
            flex-grow: 1;
        }

        main{
            margin-right: auto;
            margin-left: auto;
            width: 95vw;
            flex-grow: 10;
            flex-direction: column;
            gap: 5px;
        }

        section{
            display: flex;
            align-items: center;
            justify-content: space-evenly;
        }

        .card{
            border-radius: 2px;
            background-color: white;
            font-size: 0.7em;
            padding: 8px;
            box-shadow: -11px 9px 5px -4px rgba(0,0,0,0.31);
            border: 1px solid gainsboro;
            width: 95vw;
        }

        table{
            border-collapse: collapse;
        }

        thead, th{
            background-color: blue;
            color: white;
            font-weight: bold;
            font-size: 1.5em;
        }

        td{
            font-size: 1.5em;
            text-align: center;
        }

        tr:nth-child(even){
            background-color: #f2f2f2;
        }

        tr:hover {
            background-color: #ddd;
        }

        table img{
            height: 100px;
        }

        button{
            padding: 12px 24px;
            color: white;
            background-color: darkslategray;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 10px;
        }
        button:hover{
            opacity: 50%;
            cursor: pointer;;
        }

    </style>
</head>
<body>
    <nav>
        Amiibo App
    </nav>
    <main>

        <section>
            <button onclick="filterBySeries('Animal Crossing')">
            Animal Crossing
            </button>

            <button onclick="filterBySeries('The Legend of Zelda')">
            The Legend of Zelda
            </button>

            <button onclick="filterBySeries('Super Mario')">
            Super Mario
            </button>

            <button onclick="drawTable(state)">
            Show All
            </button>
        </section>

        <table class="card">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Series</th>
                    <th>Image</th>
                    <th>Release</th>
                </tr>
            </thead>
            <tbody id="result">
                <tr>
                    <td>Mario</td>
                    <td>Super Mario</td>
                    <td>
                    <img src="https://raw.githubusercontent.com/N3evin/AmiiboAPI/master/images/icon_00000000-00000002.png">
                    </td>
                    <td>
                    2014-11-21
                    </td>
                </tr>
            </tbody>
        </table>
    </main>

    <script>
        function drawTable(records){
            let result = document.querySelector('#result');

            let html='';

            for(let rec of records){
            
                html+=`<tr>
                <td>${rec.character}</td>
                <td>${rec.gameSeries}</td>
                <td>
                <img src="${rec.image}">
                </td>
                <td>
                ${rec.release.na}
                </td>
            </tr>`;
            }
            
            result.innerHTML = html;
        }

        let state = [];

        async function getData(url){
            const response = await fetch(url);
            const data = await response.json();
            return data.amiibo.slice(0, 100);

        }

        async function showAllGames(){
            state = await getData('https://amiiboapi.org/api/amiibo/');
            drawTable(state);
        }

        showAllGames();

        function filterBySeries(series){

        let filtered = [];
        
        for(let rec of state){
            
            if (rec.gameSeries === series)
            filtered.push(rec);
        }
        drawTable(filtered);
        }
    </script>
</body>
</html>
